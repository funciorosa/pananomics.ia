[build]
  command   = "npm run build"
  publish   = "build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."generate-pptx"]
  timeout = 26

[functions."generate-report"]
  timeout = 26

# Redirige /api/* → /.netlify/functions/*
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA fallback — todas las rutas van a index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
